<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Дежурная смена | Дашборд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Переменные для светлой темы (по умолчанию) */
        :root {
            --bg-primary: #f4f6fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-active: #eff6ff;
            --text-primary: #1a2634;
            --text-secondary: #2c4a6e;
            --text-muted: #5b6e8c;
            --text-light: #8ba0bc;
            --border-color: #e2e8f0;
            --border-light: #e9edf2;
            --border-hover: #cbdde6;
            --accent-blue: #3b82f6;
            --accent-blue-light: #1e40af;
            --table-header-bg: #f8fafd;
            --merged-row-bg: #fefce8;
            --merged-row-text: #7a621f;
            --empty-row-text: #9aaebf;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --clock-bg: #f8fafc;
            --clock-border: #e2edf2;
            --region-badge-bg: #eef2ff;
            --sidebar-width: 260px;
            --sidebar-width-mobile: 280px;
        }

        /* Темная тема */
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --bg-active: #1e3a5f;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --border-color: #334155;
            --border-light: #2d3a4e;
            --border-hover: #475569;
            --accent-blue: #60a5fa;
            --accent-blue-light: #3b82f6;
            --table-header-bg: #0f172a;
            --merged-row-bg: #2d2a1f;
            --merged-row-text: #d4b45a;
            --empty-row-text: #64748b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --clock-bg: #0f172a;
            --clock-border: #334155;
            --region-badge-bg: #1e293b;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* ШАПКА */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
            gap: 0.75rem;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .menu-toggle {
            display: none;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .menu-toggle:hover {
            background: var(--bg-hover);
        }
        .title-section {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .title-section h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }
        .theme-toggle {
            display: flex;
            gap: 0.4rem;
        }
        .theme-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.7rem;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .theme-btn:hover {
            background: var(--bg-hover);
        }
        .theme-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .msk-clock {
            background: var(--clock-bg);
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid var(--clock-border);
            text-align: center;
        }
        .msk-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .msk-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-blue);
            line-height: 1.2;
        }
        .msk-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        /* Оверлей для мобильного меню */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* БОКОВОЕ МЕНЮ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 1rem 0;
            transition: transform 0.3s ease;
            z-index: 200;
        }
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .nav-item {
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--accent-blue);
        }
        .nav-item.active {
            background: var(--bg-active);
            border-left-color: var(--accent-blue);
            color: var(--accent-blue-light);
        }
        .submenu {
            margin-left: 2rem;
            display: none;
            flex-direction: column;
            gap: 0.2rem;
            padding: 0.25rem 0 0.5rem 0;
        }
        .submenu.open {
            display: flex;
        }
        .submenu-item {
            padding: 0.4rem 1rem 0.4rem 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 0.5rem;
            transition: 0.1s;
        }
        .submenu-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .chevron {
            margin-left: auto;
            font-size: 0.65rem;
            transition: transform 0.2s;
        }
        .nav-item.has-submenu.open .chevron {
            transform: rotate(90deg);
        }

        /* ЦЕНТРАЛЬНАЯ ОБЛАСТЬ */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .content-area {
            flex: 1;
            background: var(--bg-primary);
            overflow-y: auto;
            padding: 1.5rem;
            transition: background 0.2s ease;
            display: flex;
            justify-content: center;
        }

        /* Стили для таблиц - сделаны уже и по центру */
        .tables-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 780px;
            margin: 0 auto;
        }
        .table-wrapper {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .table-header:hover {
            background: var(--bg-hover);
        }
        .table-caption {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .collapse-icon {
            font-size: 0.9rem;
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .table-wrapper.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }
        .table-content {
            overflow-x: auto;
            transition: all 0.2s;
        }
        .table-wrapper.collapsed .table-content {
            display: none;
        }
        .contact-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .contact-table th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            background: var(--table-header-bg);
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            font-size: 0.75rem;
        }
        .contact-table td {
            padding: 0.55rem 0.8rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
        }
        .contact-table tr:last-child td {
            border-bottom: none;
        }
        .merged-row {
            background: var(--merged-row-bg);
        }
        .merged-row td {
            background: var(--merged-row-bg);
            font-weight: 600;
            color: var(--merged-row-text);
        }
        .empty-row td {
            color: var(--empty-row-text);
        }
        .region-badge {
            background: var(--region-badge-bg);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            display: inline-block;
            color: var(--text-secondary);
        }
        .empty-editor {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px dashed var(--border-hover);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-light);
            padding: 2rem;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
        }
        .empty-editor p {
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }
        .empty-editor .placeholder-icon {
            font-size: 2.5rem;
            opacity: 0.5;
        }
        .editable-hint {
            background: var(--bg-hover);
            padding: 0.4rem 0.8rem;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            margin-top: 0.75rem;
            color: var(--text-muted);
        }

        /* Десктопная версия */
        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
            .sidebar {
                transform: translateX(0) !important;
            }
        }

        /* Мобильная версия */
        @media (max-width: 768px) {
            .header {
                padding: 0.6rem 0.8rem;
            }
            .header-left {
                flex: 1;
            }
            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .title-section h1 {
                font-size: 1.1rem;
            }
            .theme-toggle {
                gap: 0.3rem;
            }
            .theme-btn {
                padding: 0.25rem 0.6rem;
                font-size: 0.65rem;
            }
            .msk-clock {
                padding: 0.3rem 0.8rem;
            }
            .msk-time {
                font-size: 0.9rem;
            }
            .msk-date {
                font-size: 0.55rem;
            }
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                width: var(--sidebar-width-mobile);
                transform: translateX(-100%);
                z-index: 200;
                box-shadow: var(--shadow-md);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content-area {
                padding: 0.75rem;
            }
            .table-header {
                padding: 0.6rem 0.8rem;
            }
            .table-caption {
                font-size: 0.85rem;
            }
            .contact-table th,
            .contact-table td {
                padding: 0.45rem 0.6rem;
            }
            .tables-container {
                gap: 0.75rem;
                max-width: 100%;
            }
            .empty-editor {
                max-width: 100%;
                min-height: 300px;
                padding: 1.5rem;
            }
        }

        /* Планшеты */
        @media (min-width: 769px) and (max-width: 1024px) {
            .tables-container {
                max-width: 700px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggleBtn" aria-label="Меню">☰</button>
            <div class="title-section">
                <h1>Дежурная смена</h1>
                <div class="theme-toggle">
                    <button class="theme-btn" id="lightThemeBtn">☀️ Светлая</button>
                    <button class="theme-btn" id="darkThemeBtn">🌙 Темная</button>
                </div>
            </div>
        </div>
        <div class="msk-clock">
            <div class="msk-label">МОСКВА • MSK</div>
            <div class="msk-time" id="moscowTime">--:--:--</div>
            <div class="msk-date" id="moscowDate">--</div>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="nav-menu">
                <div class="nav-item" data-section="contacts">
                    <span>📇</span> Контакты
                </div>
                <div class="nav-item" data-section="escalation">
                    <span>⚠️</span> Эскалация
                </div>
                <div class="nav-item" data-section="email">
                    <span>✉️</span> Работа с почтой
                </div>
                <div class="nav-item has-submenu" id="instructionsMenu">
                    <span>📘</span> Инструкции
                    <span class="chevron">▶</span>
                </div>
                <div class="submenu" id="instructionsSubmenu">
                    <div class="submenu-item" data-sub="crits">📌 Криты</div>
                    <div class="submenu-item" data-sub="releases">🚀 Релизы</div>
                    <div class="submenu-item" data-sub="works">🛠️ Работы</div>
                    <div class="submenu-item" data-sub="mail">📧 Почта</div>
                    <div class="submenu-item" data-sub="reports">📊 Отчеты</div>
                </div>
            </div>
        </div>

        <div class="content-area" id="contentArea">
            <div class="empty-editor" id="emptyEditor">
                <div class="placeholder-icon">📄</div>
                <p>Область для редактирования</p>
                <div class="editable-hint">Контент будет добавлен здесь позже</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- МОБИЛЬНОЕ МЕНЮ ----------
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggleBtn');
    
    function closeMobileMenu() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }
    
    function openMobileMenu() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }
    
    if (menuToggle) {
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (sidebar.classList.contains('open')) {
                closeMobileMenu();
            } else {
                openMobileMenu();
            }
        });
    }
    
    if (overlay) {
        overlay.addEventListener('click', closeMobileMenu);
    }
    
    function closeMenuOnMobile() {
        if (window.innerWidth <= 768) {
            closeMobileMenu();
        }
    }
    
    // ---------- МОСКОВСКОЕ ВРЕМЯ ----------
    function getMoscowTime() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (3 * 60 * 60000));
    }

    function updateMoscowClock() {
        const mskNow = getMoscowTime();
        const hours = String(mskNow.getHours()).padStart(2, '0');
        const minutes = String(mskNow.getMinutes()).padStart(2, '0');
        const seconds = String(mskNow.getSeconds()).padStart(2, '0');
        const timeString = `${hours}:${minutes}:${seconds}`;
        
        const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const dayName = days[mskNow.getDay()];
        const day = mskNow.getDate();
        const month = months[mskNow.getMonth()];
        const year = mskNow.getFullYear();
        const dateString = `${dayName}, ${day} ${month} ${year}`;
        
        document.getElementById('moscowTime').innerText = timeString;
        document.getElementById('moscowDate').innerText = dateString;
    }
    
    updateMoscowClock();
    setInterval(updateMoscowClock, 1000);
    
    // ---------- ПЕРЕКЛЮЧЕНИЕ ТЕМ ----------
    function setTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            document.getElementById('darkThemeBtn').classList.add('active');
            document.getElementById('lightThemeBtn').classList.remove('active');
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            document.getElementById('lightThemeBtn').classList.add('active');
            document.getElementById('darkThemeBtn').classList.remove('active');
        }
    }
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        setTheme('dark');
    } else {
        setTheme('light');
    }
    
    document.getElementById('lightThemeBtn').addEventListener('click', () => setTheme('light'));
    document.getElementById('darkThemeBtn').addEventListener('click', () => setTheme('dark'));
    
    // ---------- ГЕНЕРАЦИЯ ТАБЛИЦ ДЛЯ КОНТАКТОВ ----------
    
    function generateDBARows() {
        let rows = '';
        rows += `<tr class="merged-row"><td colspan="3" style="text-align: center; font-weight: 600;">📌 ДБА ПГ</td></tr>`;
        for (let i = 0; i < 4; i++) {
            rows += `<tr class="empty-row"><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td></tr>`;
        }
        rows += `<tr class="merged-row"><td colspan="3" style="text-align: center; font-weight: 600;">📌 ДБА МС</td></tr>`;
        for (let i = 0; i < 4; i++) {
            rows += `<tr class="empty-row"><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td></tr>`;
        }
        return rows;
    }
    
    function generateOEIRRows() {
        let rows = '';
        for (let i = 1; i <= 15; i++) {
            if (i === 11) {
                rows += `<tr class="merged-row"><td colspan="3" style="text-align: center; font-weight: 600;">📌 ОЭИР Витрина</td></tr>`;
            } else {
                rows += `<tr class="empty-row"><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td></tr>`;
            }
        }
        return rows;
    }
    
    function generateServiceManagerRows() {
        let rows = '';
        for (let i = 0; i < 15; i++) {
            rows += `<tr class="empty-row"><td style="color: var(--empty-row-text);">—</td><td style="color: var(--empty-row-text);">—</td><td><span class="region-badge">—</span></td></tr>`;
        }
        return rows;
    }
    
    function createCollapsibleTable(title, icon, tableContent, defaultExpanded = false) {
        const expandedClass = defaultExpanded ? '' : 'collapsed';
        return `
            <div class="table-wrapper ${expandedClass}" data-expanded="${defaultExpanded}">
                <div class="table-header">
                    <div class="table-caption">
                        <span>${icon}</span>
                        <span>${title}</span>
                    </div>
                    <div class="collapse-icon">▼</div>
                </div>
                <div class="table-content">
                    ${tableContent}
                </div>
            </div>
        `;
    }
    
    function renderContactsTables() {
        const dbaTable = `
            <table class="contact-table">
                <thead><tr><th>ФИО</th><th>Контакты</th><th>Время работы</th></tr></thead>
                <tbody>${generateDBARows()}</tbody>
            </table>
        `;
        
        const oEIRTable = `
            <table class="contact-table">
                <thead><tr><th>ФИО</th><th>Контакты</th><th>Время работы</th></tr></thead>
                <tbody>${generateOEIRRows()}</tbody>
            </table>
        `;
        
        const smTable = `
            <table class="contact-table">
                <thead><tr><th>ФИО</th><th>Контакты</th><th>Регион</th></tr></thead>
                <tbody>${generateServiceManagerRows()}</tbody>
            </table>
        `;
        
        // Все таблицы создаются в свернутом виде (defaultExpanded = false)
        return `
            <div class="tables-container">
                ${createCollapsibleTable('ДБА (Администраторы баз данных)', '🗄️', dbaTable, false)}
                ${createCollapsibleTable('ОЭИР (Отдел эксплуатации информационных ресурсов)', '📊', oEIRTable, false)}
                ${createCollapsibleTable('Сервис-менеджеры', '📋', smTable, false)}
            </div>
        `;
    }
    
    function bindCollapseEvents() {
        const wrappers = document.querySelectorAll('.table-wrapper');
        wrappers.forEach(wrapper => {
            const header = wrapper.querySelector('.table-header');
            if (header && !wrapper.hasAttribute('data-listener')) {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    wrapper.classList.toggle('collapsed');
                });
                wrapper.setAttribute('data-listener', 'true');
            }
        });
    }
    
    // ---------- УПРАВЛЕНИЕ КОНТЕНТОМ ----------
    const contentArea = document.getElementById('contentArea');
    
    function setContent(contentHtml, isContacts = false) {
        contentArea.innerHTML = contentHtml;
        if (isContacts) {
            if (!document.getElementById('contacts-table-style')) {
                const style = document.createElement('style');
                style.id = 'contacts-table-style';
                style.textContent = `
                    .table-header { cursor: pointer; }
                    .table-wrapper.collapsed .collapse-icon { transform: rotate(-90deg); }
                    .contact-table .empty-row:hover td { background: var(--bg-hover); }
                `;
                document.head.appendChild(style);
            }
            bindCollapseEvents();
        }
    }
    
    function setEmptyPlaceholder(selectedItemName) {
        if (selectedItemName === 'Контакты') {
            setContent(renderContactsTables(), true);
            closeMenuOnMobile();
            return;
        }
        const emptyHtml = `
            <div class="empty-editor">
                <div class="placeholder-icon">📄</div>
                <p>${selectedItemName ? `Раздел «${selectedItemName}» — область для редактирования` : 'Область для редактирования'}</p>
                <div class="editable-hint">Контент будет добавлен здесь позже • выберите пункт меню</div>
            </div>
        `;
        setContent(emptyHtml, false);
        closeMenuOnMobile();
    }
    
    function setActiveMenuItem(activeElem) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        if (activeElem && !activeElem.classList.contains('has-submenu')) {
            activeElem.classList.add('active');
        }
    }
    
    function handleMainMenuClick(sectionName, element) {
        setActiveMenuItem(element);
        setEmptyPlaceholder(sectionName);
    }
    
    const contactsItem = document.querySelector('.nav-item[data-section="contacts"]');
    const escalationItem = document.querySelector('.nav-item[data-section="escalation"]');
    const emailWorkItem = document.querySelector('.nav-item[data-section="email"]');
    
    if (contactsItem) {
        contactsItem.addEventListener('click', () => handleMainMenuClick('Контакты', contactsItem));
    }
    if (escalationItem) {
        escalationItem.addEventListener('click', () => handleMainMenuClick('Эскалация', escalationItem));
    }
    if (emailWorkItem) {
        emailWorkItem.addEventListener('click', () => handleMainMenuClick('Работа с почтой', emailWorkItem));
    }
    
    const instructionsMenuItem = document.getElementById('instructionsMenu');
    const instructionsSubmenu = document.getElementById('instructionsSubmenu');
    const submenuItems = document.querySelectorAll('.submenu-item');
    
    if (instructionsMenuItem && instructionsSubmenu) {
        instructionsMenuItem.addEventListener('click', (e) => {
            e.stopPropagation();
            instructionsMenuItem.classList.toggle('open');
            instructionsSubmenu.classList.toggle('open');
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item !== instructionsMenuItem) item.classList.remove('active');
            });
        });
    }
    
    submenuItems.forEach(sub => {
        sub.addEventListener('click', (e) => {
            e.stopPropagation();
            let sectionName = '';
            if (sub.getAttribute('data-sub') === 'crits') sectionName = 'Инструкции / Криты';
            else if (sub.getAttribute('data-sub') === 'releases') sectionName = 'Инструкции / Релизы';
            else if (sub.getAttribute('data-sub') === 'works') sectionName = 'Инструкции / Работы';
            else if (sub.getAttribute('data-sub') === 'mail') sectionName = 'Инструкции / Почта';
            else if (sub.getAttribute('data-sub') === 'reports') sectionName = 'Инструкции / Отчеты';
            else sectionName = `Инструкции / ${sub.innerText.trim()}`;
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            instructionsMenuItem.classList.add('active');
            if (instructionsSubmenu && !instructionsSubmenu.classList.contains('open')) {
                instructionsSubmenu.classList.add('open');
                instructionsMenuItem.classList.add('open');
            }
            setEmptyPlaceholder(sectionName);
        });
    });
    
    if (instructionsMenuItem) {
        instructionsMenuItem.addEventListener('click', (e) => {
            const isSubClick = e.target.closest('.submenu-item');
            if (!isSubClick) {
                setActiveMenuItem(instructionsMenuItem);
                setEmptyPlaceholder('Инструкции (общий раздел)');
            }
        });
    }
    
    setTimeout(() => {
        setEmptyPlaceholder(null);
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (instructionsSubmenu) instructionsSubmenu.classList.remove('open');
        if (instructionsMenuItem) instructionsMenuItem.classList.remove('open');
    }, 10);
    
    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            closeMobileMenu();
        }
    });
</script>
</body>
</html>
